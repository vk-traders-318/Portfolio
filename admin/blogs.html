<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Blogs</title>

<link rel="stylesheet" href="css/admin.css">

</head>

<body>

<div class="admin-container">

<!-- SIDEBAR -->

<div class="sidebar">

<h2>Admin Panel</h2>

<ul>

<li><a href="dashboard.html">Dashboard</a></li>

<li><a href="projects.html">Projects</a></li>

<li><a href="blogs.html">Blogs</a></li>

<li><a href="profile.html">Profile</a></li>

<li><a href="messages.html">Messages</a></li>

<li><a href="#" id="logoutBtn">Logout</a></li>

</ul>

</div>


<!-- MAIN CONTENT -->

<div class="admin-main">

<h1>Blogs</h1>

<br>

<button class="admin-btn btn-add" id="addBlogBtn">
Add Blog
</button>


<!-- BLOG FORM -->

<div id="blogFormContainer" style="display:none;">

<form id="blogForm" class="admin-form">

<input type="text" id="blogTitle" placeholder="Blog Title" required>

<input type="text" id="blogExcerpt" placeholder="Short Description">

<textarea id="blogContent" placeholder="Blog Content" rows="6"></textarea>

<input type="file" id="blogImage">

<button type="submit">
Publish Blog
</button>

</form>

</div>


<br>

<!-- BLOG LIST -->

<table class="admin-table">

<thead>

<tr>

<th>Title</th>
<th>Excerpt</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="blogsTable">

</tbody>

</table>

</div>

</div>


<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>


<script src="js/firebase-config.js"></script>
<script src="js/admin-auth.js"></script>
<script src="js/admin-blogs.js"></script>

</body>

</html>
