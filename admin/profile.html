<!-- MAIN -->

<div class="admin-main">

<h1>Edit Profile</h1>

<br>

<form id="profileForm" class="admin-form">

<input type="text" id="profileName" placeholder="Name" required>

<textarea id="profileBio" placeholder="Bio" rows="4"></textarea>

<input type="text" id="profileSkills" placeholder="Skills (comma separated)">

<input type="url" id="githubLink" placeholder="GitHub Link">

<input type="url" id="instagramLink" placeholder="Instagram Link">

<input type="url" id="linkedinLink" placeholder="LinkedIn Link">

<input type="file" id="profileImage">

<button type="submit">
Save Profile
</button>

</form>

</div>

</div>
